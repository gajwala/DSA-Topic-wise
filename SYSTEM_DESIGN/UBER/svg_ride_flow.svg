<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: Rider requests -->
  <rect x="260" y="30" width="160" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="47" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Rider requests trip</text>
  <text x="340" y="65" text-anchor="middle" font-size="11" fill="#185FA5">Pickup + destination</text>
  <line x1="340" y1="74" x2="340" y2="104" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: API Gateway -->
  <rect x="260" y="104" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="121" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">API gateway</text>
  <text x="340" y="139" text-anchor="middle" font-size="11" fill="#5F5E5A">Authenticate + route</text>
  <line x1="340" y1="148" x2="340" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: Trip service -->
  <rect x="260" y="178" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="195" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Trip service</text>
  <text x="340" y="213" text-anchor="middle" font-size="11" fill="#534AB7">Create trip record</text>
  <line x1="340" y1="222" x2="340" y2="248" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Fork lines -->
  <line x1="185" y1="248" x2="495" y2="248" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="185" y1="248" x2="185" y2="258" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="495" y1="248" x2="495" y2="258" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Parallel label -->
  <text x="42" y="252" font-size="11" fill="#888780">Parallel</text>
  <text x="42" y="265" font-size="11" fill="#888780">calls</text>
  <line x1="78" y1="258" x2="109" y2="265" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Pricing service -->
  <rect x="110" y="258" width="150" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="185" y="275" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Pricing service</text>
  <text x="185" y="293" text-anchor="middle" font-size="11" fill="#993C1D">Calculate fare + surge</text>

  <!-- Matching service -->
  <rect x="420" y="258" width="150" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="495" y="275" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Matching service</text>
  <text x="495" y="293" text-anchor="middle" font-size="11" fill="#534AB7">Query nearby drivers</text>
  <line x1="495" y1="302" x2="495" y2="330" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Location service -->
  <rect x="420" y="330" width="150" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="495" y="347" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Location service</text>
  <text x="495" y="365" text-anchor="middle" font-size="11" fill="#0F6E56">Redis geo-index lookup</text>

  <!-- Rejoin lines -->
  <line x1="185" y1="302" x2="185" y2="408" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="495" y1="374" x2="495" y2="408" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="185" y1="408" x2="260" y2="408" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="495" y1="408" x2="420" y2="408" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Driver notified -->
  <rect x="260" y="390" width="160" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="407" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Driver notified</text>
  <text x="340" y="425" text-anchor="middle" font-size="11" fill="#854F0B">Kafka + WebSocket push</text>
  <line x1="340" y1="434" x2="340" y2="464" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Driver accepts -->
  <rect x="260" y="464" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="481" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Driver accepts</text>
  <text x="340" y="499" text-anchor="middle" font-size="11" fill="#0F6E56">Status → IN_PROGRESS</text>
  <line x1="340" y1="508" x2="340" y2="536" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Rider notified -->
  <rect x="260" y="536" width="160" height="36" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="559" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A">Rider notified</text>

  <!-- Title -->
  <text x="340" y="596" text-anchor="middle" font-size="11" fill="#888780">Ride request flow — Uber system design</text>
</svg>
