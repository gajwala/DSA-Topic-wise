<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Clients -->
  <rect x="40" y="40" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="100" y="67" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Rider app</text>

  <rect x="40" y="104" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="100" y="131" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Driver app</text>

  <!-- API Gateway -->
  <rect x="220" y="62" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="300" y="79" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">API gateway</text>
  <text x="300" y="97" text-anchor="middle" font-size="11" fill="#5F5E5A">Auth, rate limit, routing</text>

  <!-- Arrows clients to gateway -->
  <line x1="160" y1="62" x2="219" y2="74" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="160" y1="126" x2="219" y2="94" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Core Services container -->
  <rect x="40" y="180" width="600" height="280" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="203" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Core services</text>

  <!-- Row 1 services -->
  <rect x="60" y="218" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="125" y="237" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Trip service</text>
  <text x="125" y="255" text-anchor="middle" font-size="11" fill="#534AB7">Create, manage trips</text>

  <rect x="210" y="218" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="275" y="237" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Matching svc</text>
  <text x="275" y="255" text-anchor="middle" font-size="11" fill="#534AB7">Rider-driver pairing</text>

  <rect x="360" y="218" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="425" y="237" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Location svc</text>
  <text x="425" y="255" text-anchor="middle" font-size="11" fill="#534AB7">Real-time GPS store</text>

  <rect x="510" y="218" width="110" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="565" y="237" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Pricing svc</text>
  <text x="565" y="255" text-anchor="middle" font-size="11" fill="#534AB7">Surge, fare calc</text>

  <!-- Row 2 services -->
  <rect x="60" y="300" width="130" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="125" y="319" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Notification</text>
  <text x="125" y="337" text-anchor="middle" font-size="11" fill="#993C1D">Push, SMS, email</text>

  <rect x="210" y="300" width="130" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="275" y="319" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Payment svc</text>
  <text x="275" y="337" text-anchor="middle" font-size="11" fill="#993C1D">Stripe, wallets</text>

  <rect x="360" y="300" width="130" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="425" y="319" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Maps / ETA</text>
  <text x="425" y="337" text-anchor="middle" font-size="11" fill="#993C1D">Google Maps, routing</text>

  <rect x="510" y="300" width="110" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="565" y="319" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Auth svc</text>
  <text x="565" y="337" text-anchor="middle" font-size="11" fill="#993C1D">JWT, OAuth2</text>

  <!-- Event bus -->
  <rect x="200" y="385" width="250" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="325" y="402" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Event bus (Kafka)</text>
  <text x="325" y="420" text-anchor="middle" font-size="11" fill="#854F0B">Async messaging between services</text>

  <!-- Arrow gateway to services -->
  <line x1="300" y1="106" x2="300" y2="179" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Data stores -->
  <rect x="40" y="490" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="105" y="507" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">PostgreSQL</text>
  <text x="105" y="525" text-anchor="middle" font-size="11" fill="#5F5E5A">Trips, users</text>

  <rect x="190" y="490" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="255" y="507" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Redis</text>
  <text x="255" y="525" text-anchor="middle" font-size="11" fill="#5F5E5A">Locations, sessions</text>

  <rect x="340" y="490" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="405" y="507" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Cassandra</text>
  <text x="405" y="525" text-anchor="middle" font-size="11" fill="#5F5E5A">Trip history</text>

  <rect x="490" y="490" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="555" y="507" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">S3 / Data lake</text>
  <text x="555" y="525" text-anchor="middle" font-size="11" fill="#5F5E5A">Analytics, logs</text>

  <!-- Arrows event bus to stores -->
  <line x1="280" y1="461" x2="200" y2="489" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="325" y1="461" x2="325" y2="489" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="360" y1="461" x2="430" y2="489" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="572" width="12" height="12" rx="2" fill="#185FA5"/>
  <text x="58" y="582" font-size="11" fill="#5F5E5A">Clients</text>
  <rect x="110" y="572" width="12" height="12" rx="2" fill="#534AB7"/>
  <text x="128" y="582" font-size="11" fill="#5F5E5A">Core services</text>
  <rect x="220" y="572" width="12" height="12" rx="2" fill="#993C1D"/>
  <text x="238" y="582" font-size="11" fill="#5F5E5A">Integrations</text>
  <rect x="320" y="572" width="12" height="12" rx="2" fill="#854F0B"/>
  <text x="338" y="582" font-size="11" fill="#5F5E5A">Event bus</text>
  <rect x="410" y="572" width="12" height="12" rx="2" fill="#5F5E5A"/>
  <text x="428" y="582" font-size="11" fill="#5F5E5A">Data stores</text>
</svg>
