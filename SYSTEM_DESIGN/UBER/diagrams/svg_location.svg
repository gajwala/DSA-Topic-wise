<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Driver app -->
  <rect x="30" y="160" width="110" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="85" y="180" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Driver app</text>
  <text x="85" y="198" text-anchor="middle" font-size="11" fill="#185FA5">GPS every 4s</text>
  <line x1="140" y1="188" x2="174" y2="188" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- WebSocket -->
  <rect x="174" y="160" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="234" y="180" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">WebSocket svc</text>
  <text x="234" y="198" text-anchor="middle" font-size="11" fill="#5F5E5A">Persistent connection</text>
  <line x1="294" y1="188" x2="328" y2="188" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Kafka -->
  <rect x="328" y="160" width="110" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="383" y="180" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Kafka topic</text>
  <text x="383" y="198" text-anchor="middle" font-size="11" fill="#854F0B">location-updates</text>

  <!-- Fan-out arrows -->
  <line x1="438" y1="175" x2="544" y2="128" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="438" y1="200" x2="544" y2="248" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Location service -->
  <rect x="544" y="100" width="110" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="599" y="120" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Location svc</text>
  <text x="599" y="138" text-anchor="middle" font-size="11" fill="#0F6E56">Consume + write</text>
  <line x1="599" y1="100" x2="599" y2="68" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Redis GEO -->
  <rect x="544" y="30" width="110" height="38" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="599" y="54" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Redis GEO</text>
  <text x="599" y="24" text-anchor="middle" font-size="11" fill="#888780">Nearest-driver queries</text>

  <!-- Trip tracker -->
  <rect x="544" y="220" width="110" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="599" y="240" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Trip tracker</text>
  <text x="599" y="258" text-anchor="middle" font-size="11" fill="#993C1D">Consume + append</text>
  <line x1="599" y1="276" x2="599" y2="304" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Cassandra -->
  <rect x="544" y="304" width="110" height="38" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="599" y="328" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Cassandra</text>
  <text x="599" y="358" text-anchor="middle" font-size="11" fill="#888780">Route history</text>

  <!-- Matching service -->
  <rect x="174" y="304" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="239" y="324" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Matching svc</text>
  <text x="239" y="342" text-anchor="middle" font-size="11" fill="#534AB7">GEORADIUS lookup</text>

  <!-- Redis to Matching arrow -->
  <path d="M544 323 L470 323 L470 332 L304 332" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="430" y="317" text-anchor="middle" font-size="11" fill="#888780">reads</text>

  <!-- Rider app -->
  <rect x="30" y="304" width="110" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="85" y="324" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Rider app</text>
  <text x="85" y="342" text-anchor="middle" font-size="11" fill="#185FA5">Shows driver on map</text>
  <line x1="174" y1="332" x2="140" y2="332" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="157" y="326" text-anchor="middle" font-size="11" fill="#888780">push</text>

  <!-- Title -->
  <text x="340" y="408" text-anchor="middle" font-size="11" fill="#888780">Real-time location tracking pipeline — Uber system design</text>
</svg>
